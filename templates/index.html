<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title></title>
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@19?dev",
                "react-dom": "https://esm.sh/react-dom@19?dev",
                "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
                "react-router-dom": "https://esm.sh/react-router-dom@7?external=react",
                "react-router": "https://esm.sh/react-router@7?external=react",
                "recharts": "https://esm.sh/recharts@2?external=react,react-dom"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://kit.fontawesome.com/18cb25cb8a.js" crossorigin="anonymous"></script>
</head>
<body class="bg-main">
<div id="root" class="bg-main"></div>
<script data-type="module" type="text/babel">
    import React from "react"
    import {createRoot} from "react-dom/client";
    import {BrowserRouter, Routes, Route, Link, useLocation} from "react-router-dom";
    import {
        Line,
        LineChart,
        ResponsiveContainer,
        CartesianGrid,
        Legend,
        XAxis,
        YAxis,
        Label,
        Tooltip,
        Brush
    } from 'recharts';

    const DateFromPDF = (filename) => {
        const match = filename.match(/(\d{2})(\d{2})(\d{4})/);
        if (!match) return null;

        const [_, day, month, year] = match;
        return new Date(year, month - 1, day);
    }

    const seiMesiFa = () => {
        return Date.now() - (6 * 30 * 24 * 60 * 60 * 1000);
    }

    function useIsMobile() {
        const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);

        React.useEffect(() => {
            const handleResize = () => {
                setIsMobile(window.innerWidth < 768);
            };

            window.addEventListener("resize", handleResize);
            return () => window.removeEventListener("resize", handleResize);
        }, []);

        return isMobile;
    }

    function NavBar() {
        function NavItem(props) {
            const title = PAGE_TITLES[useLocation().pathname];
            document.title = title;

            return (
                <Link
                    className={"width-fit flex-center transition rounded pointer gap-1 padding-05-1 " + ((title === props.label) ? "selected" : "unselected")}
                    to={props.url}>
                    {props.icon}
                    <h2>{props.name}</h2>
                </Link>
            );
        }

        const PAGE_TITLES = {
            "/": "Rassegna stampa",
            "/social": "Social Media",
            "/admin": "Amministrazione"
        };

        return (
            <nav className="navbar flex shadow width-100">

                <img src="static/images/logo.png" alt="UNIMORE"/>


                <div className="flex-center navbar-items gap-2">
                    <NavItem name={<>Social <span id="media">media</span></>} label="Social Media" icon={<i className="fa-solid fa-chart-column"></i>}
                             url="/social"/>
                    <NavItem name={<>Rassegna <span id="stampa">stampa</span></>} label="Rassegna stampa"
                             icon={<i className="fa-regular fa-file-lines"></i>} url="/"/>
                    <NavItem name="Amministrazione" label="Amministrazione" icon={<i className="fa-solid fa-plus"></i>}
                             url="/admin"/>
                </div>
            </nav>
        )
    }

    function Title(props) {
        return (
            <div>
                <h1>{props.title}</h1>
                <h4>{props.subtitle}</h4>
            </div>
        )
    }

    function SocialTitle(props) {
        return (
            <div className={"width-fit flex-center rounded gap-1 padding-05-1 " + (props.social)}>
                <i className={"fa-brands fa-" + (props.social.toLowerCase())}></i>
                <h3>{props.social}</h3>
            </div>
        )
    }

    function SectionTitle(props) {
        return (
            <div className="width-fit flex-center rounded gap-1 padding-05-1">
                <i className="fa-regular fa-file-lines color-primary"></i>
                <h3>{props.title}</h3>
            </div>
        )
    }

    function Social() {
        function Chart(props) {
            const [data, setData] = React.useState([]);

            React.useEffect(() => {
                fetch(`/social/${props.social}`)
                .then(res => res.json())
                .then(data => {
                    setData(data.map(d => ({
                        ...d,
                        giorno: new Date(d.giorno).getTime()
                    })));
                })
                .catch(err => console.error('Errore nel caricamento dei dati di ' + props.social + ': ' + err))
            }, [props.social]);

            const startIndex = React.useMemo(() => {
                const idx = data.findIndex(d => d.giorno >= seiMesiFa());
                return idx === -1 ? 0 : idx;
            }, [data]);

            const [visibili, setVisibili] = React.useState({
                follower: true,
                interazioni: true,
                visualizzazioni: true
            });

            const labels = {
                follower: 'Follower',
                interazioni: 'Interazioni',
                visualizzazioni: 'Visualizzazioni'
            }

            const toggleLinea = (linea) => {
                setVisibili(prev => ({...prev, [linea]: !prev[linea]}));
            };

            const isMobile = useIsMobile();

            function Filter(props) {
                return (
                    <div className="width-fit flex-center bg-main pointer rounded gap-1 padding-05-1 " onClick={() => toggleLinea(props.line)}>
                        <i className={"fa-solid " + (visibili[props.line] ? 'fa-minus' : 'fa-plus')}></i>
                        <p>{labels[props.line]}</p>
                    </div>
                )
            }

            return (
                <div className="flex-column gap-1">
                    <div className="flex gap-1 filter">
                        <Filter line="follower"/>
                        <Filter line="visualizzazioni"/>
                        <Filter line="interazioni"/>
                    </div>

                    <div className="flex-column width-100">
                        <ResponsiveContainer width="100%" height={400}>
                            <LineChart data={data}>
                                <CartesianGrid/>
                                <Line hide={!visibili.follower} dataKey="follower" stroke="red" name="Followers"
                                      strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibili.interazioni} dataKey="interazioni" stroke="green"
                                      name="Interazioni" strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibili.visualizzazioni} dataKey="visualizzazioni" stroke="blue"
                                      name="Visualizzazioni" strokeWidth={2} isAnimationActive={false}/>
                                <XAxis
                                    dataKey="giorno"
                                    scale="time"
                                    type="number"
                                    domain={['dataMin', 'dataMax']}
                                    tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                        day: '2-digit',
                                        month: '2-digit',
                                        year: 'numeric'
                                    })}
                                />
                                <Brush
                                    key={startIndex}
                                    dataKey="giorno"
                                    height={20}
                                    stroke="lightgray"
                                    travellerWidth={10}
                                    startIndex={startIndex === -1 ? 0 : startIndex}
                                    tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                        day: '2-digit',
                                        month: '2-digit',
                                        year: 'numeric'
                                    })}
                                />
                                {!isMobile && <YAxis/>}
                                <Tooltip labelFormatter={(date) => new Date(date).toLocaleDateString("it-IT")}/>
                                <Legend align="right"/>
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        function SocialChart(props) {
            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <SocialTitle social={props.social}/>
                    <Chart social={props.social}/>
                </div>
            )
        }

        return (
            <div className="content flex-column gap-2 width-100">
                <Title title="Social Media" subtitle="Panoramica delle performance sui social media"/>

                <div className="flex-column gap-2">
                    <SocialChart social="Instagram"/>
                    <SocialChart social="Facebook"/>
                    <SocialChart social="Linkedin"/>
                </div>
            </div>
        )
    }

    function Admin() {
        function SocialForm(props) {
            const today = new Date().toISOString().split('T')[0];
            const [message, setMessage] = React.useState(null);
            const [error, setError] = React.useState(null);

            const sendForm = (e) => {
                e.preventDefault();
                setError("");
                setMessage("");


                fetch("/admin/social", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        giorno: e.target.giorno.value,
                        visualizzazioni: e.target.visualizzazioni.value,
                        interazioni: e.target.interazioni.value,
                        follower: e.target.follower.value,
                        social: props.social
                    })
                })
                .then(res => {
                    if (res.ok) {
                        setMessage("Dati inseriti correttamente");
                    }
                    else {
                        res.text().then(text => {
                            setError(text);
                        })
                    }
                })
                .catch (err => {
                    setError("Errore di connessione al server");
                })
                .finally(() => {
                    document.body.style.cursor = 'default';
                });
            }

            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <div className="flex-column gap-05">
                        <SocialTitle social={props.social}/>
                        <h4>Inserisci i dati giornalieri per {props.social}</h4>
                    </div>

                    <form name="adminForm" autoComplete="off" onSubmit={sendForm} className="flex-column gap-1">
                        <label>
                            DATA
                            <input type="date" name="giorno" defaultValue={today} className="input date width-100 rounded" required max={today}/>
                        </label>

                        <label>
                            VISUALIZZAZIONI
                            <input type="number" name="visualizzazioni" defaultValue="0" min="0" className="input width-100 rounded" required/>
                        </label>

                        <label>
                            INTERAZIONI
                            <input type="number" name="interazioni" defaultValue="0" min="0" className="input width-100 rounded" required/>
                        </label>

                        <label>
                            NUOVI FOLLOWERS
                            <input type="number" name="follower" defaultValue="0" className="input width-100 rounded" required/>
                        </label>

                        <div className="width-fit flex-center gap-1">
                            <input type="submit" value="Salva Dati" className="submit pointer rounded padding-05-1" data-platform={props.social}/>
                            {message && <p className="message">{message}</p>}
                            {error && <p className="error">{error}</p>}
                        </div>
                    </form>
                </div>
            )
        }

        function RassegnaForm () {
            const [message, setMessage] = React.useState(null);
            const [error, setError] = React.useState(null);

            const [dragging, setDragging] = React.useState(false);

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragging(false);

                e.target.files = Array.from(e.dataTransfer.files);
                sendForm(e);
            };

            const handleChange = (e) => {
                sendForm(e);
            }

            const sendForm = (e) => {
                setMessage("");
                setError("");

                const formData = new FormData();
                const files = e.target.files;

                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }

                document.body.style.cursor = 'wait';

                fetch("/admin/rassegna", {
                    method: 'POST',
                    body: formData
                })
                .then(res => {
                    if (res.ok) {
                        setMessage("Dati inseriti correttamente");
                    }
                    else {
                        res.text().then(text => {
                            setError(text);
                        });
                    }
                })
                .catch (err => {
                    setError("Errore di connessione al server");
                })
                .finally(() => {
                    document.body.style.cursor = 'default';
                });
            }

            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <div>
                        <div className="width-fit flex-center gap-1">
                            <SectionTitle title="Carica rassegna stampa"/>
                            {message && <p className="message">{message}</p>}
                            {error && <p className="error">{error}</p>}
                        </div>

                        <h4>Carica un file pdf per estrarre automaticamente il numero di articoli</h4>
                    </div>

                    <form encType="multipart/form-data">
                        <label
                            className={`dropzone transition rounded flex-center width-100 pointer ${dragging ? "dragging" : ""}`}
                            onDragOver={handleDragOver}
                            onDrop={handleDrop}>
                            <input type="file" accept=".pdf" multiple onChange={handleChange} hidden/>
                            <div className="dropzone-content flex-center flex-column gap-05">
                                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                     viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <p className="dropzone-title">Trascina uno o più file PDF qui</p>
                                <p className="dropzone-sub">oppure clicca per selezionare</p>
                            </div>
                        </label>
                    </form>

                    <div className="rounded bg-main padding-1">
                        <p className="bold">Come funziona:</p>
                        <ol className="flex-column gap-05 padding-05-1">
                            <li>Carica uno o più file PDF di rassegne stampa</li>
                            <li>Il sistema estrae automaticamente il numero di articoli</li>
                            <li>La data viene rilevata dal nome del file (es. "Unimore29052026.pdf")</li>
                            <li>Visualizza i risultati nella pagina Rassegna Stampa</li>
                        </ol>
                    </div>
                </div>
            )
        }

        function ListItem(props) {
            return (
                <div className="flex-between transition flex-center rounded width-100 bg-main padding-05-1">
                    <p>{props.name}</p>
                    <p id="date-list-item">{DateFromPDF(props.name).toLocaleDateString('it-IT')}</p>
                    <div className="flex gap-1">
                        <a className="padding-1 transition flex-center pointer rounded unselected" href={`/static/pdfs/${props.name}`} download><i
                            className="fa-solid fa-download"></i></a>
                        <a className="padding-1 transition flex-center pointer rounded unselected" href={`/static/pdfs/${props.name}`} target="_blank"
                           rel="noreferrer"><i
                            className="fa-solid fa-eye"></i></a>
                    </div>
                </div>
            )
        }

        return (
            <div className="content flex-column gap-2 width-100">
                <Title title="Amministrazione" subtitle="Aggiungi dati social e carica rassegne stampa"/>

                <div className="flex-column gap-2">
                    <SocialForm social="Instagram"/>
                    <SocialForm social="Facebook"/>
                    <SocialForm social="Linkedin"/>
                </div>

                <div className="flex-column gap-2">
                    <RassegnaForm />
                </div>

                <div className="flex-column gap-2">
                    <div className="section transition rounded shadow flex-column gap-1">
                        <h3>Rassegne stampa caricate</h3>

                        <div className="flex-center flex-column gap-1 width-100">
                            <ListItem name="Unimore15032026.pdf"/>
                            <ListItem name="Unimore15022026.pdf"/>
                        </div>
                    </div>
                </div>
            </div>
        )
    }

    function Index() {
        function Chart() {
            const [data, setData] = React.useState([]);

            React.useEffect(() => {
                fetch('/rassegne')
                .then(res =>res.json())
                .then(data => setData(data.map(d => ({
                    ...d,
                    giorno: new Date(d.giorno).getTime()
                }))))
                .catch(err => console.error('Errore nel caricamento dei dati: ' + err))

                console.log(data)
            }, []);

            const startIndex = data.findIndex(d => d.giorno >= seiMesiFa());

            const isMobile = useIsMobile();

            return (
                <ResponsiveContainer width="100%" height={400}>
                    <LineChart data={data}>
                        <CartesianGrid/>
                        <Line dataKey="numero_articoli" stroke="var(--color-primary)" name="Numero articoli" strokeWidth={2}  isAnimationActive={false}/>
                        <XAxis
                            dataKey="giorno"
                            scale="time"
                            type="number"
                            domain={['dataMin', 'dataMax']}
                            tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            })}
                        />
                        <Brush
                            dataKey="giorno"
                            height={20}
                            stroke="lightgray"
                            travellerWidth={10}
                            startIndex={startIndex === -1 ? 0 : startIndex}
                            tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            })}
                        />
                        {!isMobile && <YAxis/>}
                        <Tooltip labelFormatter={(date) => new Date(date).toLocaleDateString("it-IT")}/>
                        <Legend align="right"/>
                    </LineChart>
                </ResponsiveContainer>
            );
        }

        return (
            <div className="content flex-column gap-2">
                <Title title="Rassegna stampa" subtitle="Gestione e analisi delle rassegne stampa"/>

                <div className="flex-column gap-2">
                    <div className="section transition rounded shadow flex-column gap-1">
                        <SectionTitle title="Numero di articoli"/>

                        <Chart/>
                    </div>
                </div>

                <div className="flex-column gap-2">
                    <div className="section transition rounded width-100 shadow flex-column gap-1">
                        <div className="flex-center width-100 rounded gap-1 padding-05-1">
                            <i className="fa-solid fa-magnifying-glass color-primary"></i>
                            <input type="text" id="cerca"
                                   placeholder="Cerca per nome o data es. ('Unimore' o '29 maggio') . . ."
                                   className="width-100"/>
                        </div>
                    </div>
                </div>
            </div>
        )
    }

    function App() {
        return (
            <BrowserRouter>
                <NavBar/>
                <Routes>
                    <Route path="/" element={<Index/>}></Route>
                    <Route path="/admin" element={<Admin/>}></Route>
                    <Route path="/social" element={<Social/>}></Route>
                </Routes>
            </BrowserRouter>
        )
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App/>);
</script>
</body>
</html>
