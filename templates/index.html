<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title></title>
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@19?dev",
                "react-dom": "https://esm.sh/react-dom@19?dev",
                "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
                "react-router-dom": "https://esm.sh/react-router-dom@7?external=react",
                "react-router": "https://esm.sh/react-router@7?external=react",
                "recharts": "https://esm.sh/recharts@2?external=react,react-dom"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://kit.fontawesome.com/18cb25cb8a.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script data-type="module" type="text/babel">
    import React from "react"
    import {createRoot} from "react-dom/client";
    import {BrowserRouter, Routes, Route, Link, useLocation} from "react-router-dom";
    import {
        Line,
        LineChart,
        ResponsiveContainer,
        CartesianGrid,
        Legend,
        XAxis,
        YAxis,
        Label,
        Tooltip,
        Brush
    } from 'recharts';

    const DateFromPDF = (filename) => {
        const match = filename.match(/(\d{2})(\d{2})(\d{4})/);
        if (!match) return null;

        const [_, day, month, year] = match;
        return new Date(year, month - 1, day);
    }

    function useIsMobile() {
        const [isMobile, setIsMobile] = React.useState(window.innerWidth < 768);

        React.useEffect(() => {
            const handleResize = () => {
                setIsMobile(window.innerWidth < 768);
            };

            window.addEventListener("resize", handleResize);
            return () => window.removeEventListener("resize", handleResize);
        }, []);

        return isMobile;
    }

    function NavBar() {
        function NavItem(props) {
            const title = PAGE_TITLES[useLocation().pathname];
            document.title = title;

            return (
                <Link
                    className={"navbar-item pointer navbar-choice " + ((title === props.label) ? "selected" : "unselected")}
                    to={props.url}>
                    {props.icon}
                    <h2>{props.name}</h2>
                </Link>
            );
        }

        const PAGE_TITLES = {
            "/": "Rassegna stampa",
            "/social": "Social Media",
            "/admin": "Amministrazione"
        };

        return (
            <nav className="navbar">
                <div className="left">
                    <img src="static/images/logo.png" alt="UNIMORE" className="logo"/>
                </div>

                <div className="right">
                    <NavItem name={<>Social <span>media</span></>} label="Social Media" icon={<i className="fa-solid fa-chart-column"></i>}
                             url="/social"/>
                    <NavItem name={<>Rassegna <span>stampa</span></>} label="Rassegna stampa"
                             icon={<i className="fa-regular fa-file-lines"></i>} url="/"/>
                    <NavItem name="Amministrazione" label="Amministrazione" icon={<i className="fa-solid fa-plus"></i>}
                             url="/admin"/>
                </div>
            </nav>
        )
    }

    function Title(props) {
        return (
            <div>
                <h1>{props.title}</h1>
                <h4>{props.subtitle}</h4>
            </div>
        )
    }

    function SocialSectionTitle(props) {
        return (
            <div className={"section-title social-name " + (props.social)}>
                <i className={"fa-brands fa-" + (props.social.toLowerCase())}></i>
                <h3>{props.social}</h3>
            </div>
        )
    }

    function SectionTitle(props) {
        return (
            <div className="section-title">
                <i className="fa-regular fa-file-lines color-red"></i>
                <h3>{props.title}</h3>
            </div>
        )
    }

    function Social() {
        function Chart(props) {
            const [data, setData] = React.useState([]);

            const formattedData = data.map(d => ({
                ...d,
                data: new Date(d.data).getTime()
            }));

            React.useEffect(() => {
                fetch(`/social/${props.social}`)
                .then(res => res.json())
                .then(data => setData(data.map(d => ({
                    ...d,
                    giorno: new Date(d.giorno).getTime()
                }))))
                .catch(err => console.error('Errore nel caricamento dei dati di ' + props.social + ': ' + err))
            }, [props.social]);

            const seiMesiFa = Date.now() - (6 * 30 * 24 * 60 * 60 * 1000);
            const startIndex = data.findIndex(d => d.data >= seiMesiFa);

            const [visibili, setVisibili] = React.useState({
                follower: true,
                interazioni: true,
                visualizzazioni: true
            });

            const labels = {
                follower: 'Follower',
                interazioni: 'Interazioni',
                visualizzazioni: 'Visualizzazioni'
            }

            const toggleLinea = (linea) => {
                setVisibili(prev => ({...prev, [linea]: !prev[linea]}));
            };

            const isMobile = useIsMobile();

            function Filter(props) {
                return (
                    <div className="section-title filter pointer " onClick={() => toggleLinea(props.line)}>
                        <i className={"fa-solid " + (visibili[props.line] ? 'fa-minus' : 'fa-plus')}></i>
                        <p>{labels[props.line]}</p>
                    </div>
                )
            }

            return (
                <div className="margin-top-1">
                    <div className="left">
                        <Filter line="follower"/>
                        <Filter line="visualizzazioni"/>
                        <Filter line="interazioni"/>
                    </div>

                    <div className="chart">
                        <ResponsiveContainer width="100%" height={400}>
                            <LineChart data={data}>
                                <CartesianGrid/>
                                <Line hide={!visibili.follower} dataKey="follower" stroke="red" name="Followers"
                                      strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibili.interazioni} dataKey="interazioni" stroke="green"
                                      name="Interazioni" strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibili.visualizzazioni} dataKey="visualizzazioni" stroke="blue"
                                      name="Visualizzazioni" strokeWidth={2} isAnimationActive={false}/>
                                <XAxis
                                    dataKey="giorno"
                                    scale="time"
                                    type="number"
                                    domain={['dataMin', 'dataMax']}
                                    tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                        day: '2-digit',
                                        month: '2-digit',
                                        year: 'numeric'
                                    })}
                                />
                                <Brush
                                    dataKey="data"
                                    height={20}
                                    stroke="lightgray"
                                    travellerWidth={10}
                                    startIndex={startIndex === -1 ? 0 : startIndex}
                                    tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                        day: '2-digit',
                                        month: '2-digit',
                                        year: 'numeric'
                                    })}
                                />
                                {!isMobile && <YAxis/>}
                                <Tooltip labelFormatter={(date) => new Date(date).toLocaleDateString("it-IT")}/>
                                <Legend align="right"/>
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        function SocialChart(props) {
            return (
                <div className="section">
                    <SocialSectionTitle social={props.social}/>
                    <Chart social={props.social}/>
                </div>
            )
        }

        return (
            <div className="content">
                <div className="container">
                    <Title title="Social Media" subtitle="Panoramica delle performance sui social media"/>

                    <div className="content-container">
                        <SocialChart social="Instagram"/>
                        <SocialChart social="Facebook"/>
                        <SocialChart social="Linkedin"/>
                    </div>
                </div>
            </div>
        )
    }

    function Admin() {
        function SocialForm(props) {
            const today = new Date().toISOString().split('T')[0];
            const [message, setMessage] = React.useState(null);
            const [error, setError] = React.useState(null);

            const  sendForm = (e) => {
                const URL = "/admin/social";
                e.preventDefault();

                try {
                    fetch(URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            giorno: e.target.giorno.value,
                            visualizzazioni: e.target.visualizzazioni.value,
                            interazioni: e.target.interazioni.value,
                            follower: e.target.follower.value,
                            social: props.social
                        })
                    })
                    .then(res => {
                        if (res.ok) {
                            setError("");
                            setMessage("Dati inseriti correttamente");
                        } else {
                            setMessage("");
                            setError(res.text());
                        }
                    })
                } catch (err) {
                    setMessage("");
                    setError("Errore di connessione al server");
                }
            }

            return (
                <div className="section">
                    <SocialSectionTitle social={props.social}/>
                    <h4>Inserisci i dati giornalieri per {props.social}</h4>

                    <form className="margin-top-1" name="adminForm" autoComplete="off" onSubmit={sendForm}>
                        <label>
                            DATA
                            <input type="date" name="giorno" defaultValue={today} className="input date" required max={today}/>
                        </label>

                        <label>
                            VISUALIZZAZIONI
                            <input type="number" name="visualizzazioni" defaultValue="0" min="0" className="input" required/>
                        </label>

                        <label>
                            INTERAZIONI
                            <input type="number" name="interazioni" defaultValue="0" min="0" className="input" required/>
                        </label>

                        <label>
                            NUOVI FOLLOWERS
                            <input type="number" name="follower" defaultValue="0" className="input" required/>
                        </label>

                        <br/>
                        <div className="submit-message">
                            <input type="submit" value="Salva Dati" className={"submit pointer submit-" + props.social}/>
                            {message && <p className="message">{message}</p>}
                            {error && <p className="error">{error}</p>}
                        </div>
                    </form>
                </div>
            )
        }

        return (
            <div className="content">
                <div className="container">
                    <Title title="Amministrazione" subtitle="Aggiungi dati social e carica rassegne stampa"/>

                    <div className="content-container">
                        <SocialForm social="Instagram"/>
                        <SocialForm social="Facebook"/>
                        <SocialForm social="Linkedin"/>
                    </div>

                    <div className="content-container">
                        <div className="section">
                            <SectionTitle title="Carica rassegna stampa"/>
                            <h4>Carica un file pdf per estrarre automaticamente il numero di articoli</h4>

                            <form encType="multipart/form-data" method="post">
                                <label className="dropzone">
                                    <input type="file" accept=".pdf"/>
                                    <div className="dropzone-content">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                             viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.5">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                            <polyline points="17 8 12 3 7 8"/>
                                            <line x1="12" y1="3" x2="12" y2="15"/>
                                        </svg>
                                        <p className="dropzone-title">Trascina un file PDF qui</p>
                                        <p className="dropzone-sub">oppure clicca per selezionare</p>
                                        <p className="dropzone-hint">Solo file PDF • Max 50MB</p>
                                    </div>
                                </label>
                            </form>

                            <div className="grey-container">
                                <p className="bold">Come funziona:</p>
                                <ol>
                                    <li>Carica un file PDF della rassegna stampa</li>
                                    <li>Il sistema estrae automaticamente il numero di articoli</li>
                                    <li>La data viene rilevata dal nome del file (es. "Unimore29052026.pdf"</li>
                                    <li>Visualizza i risultati nella pagina Rassegna Stampa</li>
                                </ol>
                            </div>
                        </div>
                    </div>

                    <div className="content-container">
                        <div className="section">
                            <SectionTitle title="Elimina rassegna stampa"/>
                            <h4>Inserisci il nome del file della rassegna che vuoi eliminare</h4>

                            <form className="margin-top-1">
                                <label>
                                    NOME FILE
                                    <input type="text" id="nomeFile" className="input"/>
                                </label>
                                <input type="submit" id="eliminaRassegna" value="Elimina"
                                       className="submit pointer submit-Instagram"/>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        )
    }

    function Index() {
        function ListItem(props) {
            return (
                <div className="list-item">
                    <p>{props.name}</p>
                    <p id="date-list-item">{DateFromPDF(props.name).toLocaleDateString('it-IT')}</p>
                    <div className="file-button-container">
                        <a className="file-button pointer" href={`/static/pdfs/${props.name}`} download><i
                            className="fa-solid fa-download"></i></a>
                        <a className="file-button pointer" href={`/static/pdfs/${props.name}`} target="_blank"
                           rel="noreferrer"><i
                            className="fa-solid fa-eye"></i></a>
                    </div>
                </div>
            )
        }

        function Chart() {
            const data = [
                {
                    data: new Date('2026-02-10'),
                    numero: 400,
                },
                {
                    data: new Date('2026-02-17'),
                    numero: 278,
                },
                {
                    data: new Date('2026-02-20'),
                    numero: 200,
                },
                {
                    data: new Date('2026-03-03'),
                    numero: 300,
                },
                {
                    data: new Date('2026-03-10'),
                    numero: 189,
                },
                {
                    data: new Date('2027-03-10'),
                    numero: 189,
                },
            ];

            const formattedData = data.map(d => ({
                ...d,
                data: new Date(d.data).getTime()
            }));

            const seiMesiFa = Date.now() - (6 * 30 * 24 * 60 * 60 * 1000);
            const startIndex = formattedData.findIndex(d => d.data >= seiMesiFa);

            const isMobile = useIsMobile();

            return (
                <ResponsiveContainer width="100%" height={400}>
                    <LineChart data={formattedData}>
                        <CartesianGrid/>
                        <Line dataKey="numero" stroke="var(--detail)" name="Numero articoli" strokeWidth={2}/>
                        <XAxis
                            dataKey="data"
                            scale="time"
                            type="number"
                            domain={['dataMin', 'dataMax']}
                            tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            })}
                        />
                        <Brush
                            dataKey="data"
                            height={20}
                            stroke="lightgray"
                            travellerWidth={10}
                            startIndex={startIndex === -1 ? 0 : startIndex}
                            tickFormatter={(data) => new Date(data).toLocaleDateString('it-IT', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            })}
                        />
                        {!isMobile && <YAxis/>}
                        <Tooltip labelFormatter={(date) => new Date(date).toLocaleDateString("it-IT")}/>
                        <Legend align="right"/>
                    </LineChart>
                </ResponsiveContainer>
            );
        }

        return (
            <div className="content">
                <div className="container">
                    <Title title="Rassegna stampa" subtitle="Gestione e analisi delle rassegne stampa"/>

                    <div className="content-container">
                        <div className="section">
                            <SectionTitle title="Numero di articoli"/>

                            <Chart/>
                        </div>
                    </div>

                    <div className="content-container">
                        <div className="section width-100">
                            <div className="section-title width-100">
                                <i className="fa-solid fa-magnifying-glass color-red"></i>
                                <input type="text" id="cerca"
                                       placeholder="Cerca per nome o data es. ('Unimore' o '29 maggio') . . ."
                                       className="width-100"/>
                            </div>
                        </div>
                    </div>

                    <div className="content-container">
                        <div className="section">
                            <h3>Rassegne stampa caricate</h3><br/>

                            <div className="content">
                                <ListItem name="Unimore15032026.pdf"/>
                                <ListItem name="Unimore15022026.pdf"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        )
    }

    function App() {
        return (
            <BrowserRouter>
                <NavBar/>
                <Routes>
                    <Route path="/" element={<Index/>}></Route>
                    <Route path="/admin" element={<Admin/>}></Route>
                    <Route path="/social" element={<Social/>}></Route>
                </Routes>
            </BrowserRouter>
        )
    }

    const root = createRoot(document.getElementById("root"));
    root.render(<App/>);
</script>
</body>
</html>
