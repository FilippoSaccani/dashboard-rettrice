<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@19?dev",
                "react-dom": "https://esm.sh/react-dom@19?dev",
                "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
                "react-router-dom": "https://esm.sh/react-router-dom@7?external=react",
                "react-router": "https://esm.sh/react-router@7?external=react",
                "recharts": "https://esm.sh/recharts@2?external=react,react-dom"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://kit.fontawesome.com/18cb25cb8a.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script data-type="module" type="text/babel">
    import React from "react"
    import {createRoot} from "react-dom/client";
    import {BrowserRouter, Routes, Route, Link, useLocation} from "react-router-dom";
    import {Line, LineChart, ResponsiveContainer, CartesianGrid, Legend, XAxis, YAxis, Tooltip, Brush} from 'recharts';

    // Formattatore per la UI (dd/mm/yyyy)
    const uiDateFormatter = new Intl.DateTimeFormat('it-IT', {
        day: '2-digit', month: '2-digit', year: 'numeric'
    });
    const toTimestamp = (dateStr) => new Date(dateStr).getTime();
    const formatToUI = (timestamp) => uiDateFormatter.format(new Date(timestamp));

    function toggleVisibility(setState, key) {
        setState(prev => ({...prev, [key]: !prev[key]}));
    }

    const refreshManager = {
        value: 0,
        listeners: new Set(),
        set(val = this.value + 1) {
            this.value = val;
            this.listeners.forEach(fn => fn(val));
        },
        subscribe(fn) {
            this.listeners.add(fn);
            return () => this.listeners.delete(fn);
        }
    }

    const cleanData = (rawData) => {
        return rawData.map(d => ({
            ...d,
            timestamp: new Date(d.giorno).getTime(),
            displayDate: uiDateFormatter.format(new Date(d.giorno))
        }))
    }

    function getStartingIndex(data) {
        const sixMonthAgo = new Date();
        sixMonthAgo.setMonth(sixMonthAgo.getMonth() - 6);

        const index = data.findIndex(
            d => d.timestamp >= sixMonthAgo
        );

        return index === -1 ? 0 : index;
    }

    function useIsMobile() {
        const width = 1300;

        const [isMobile, setIsMobile] = React.useState(
            window.innerWidth <= width
        );

        React.useEffect(() => {
            const onResize = () => setIsMobile(window.innerWidth <= width);
            window.addEventListener("resize", onResize);
            return () => window.removeEventListener("resize", onResize);
        }, []);

        return isMobile;
    }

    function NavBar() {
        function NavItem({name, icon, url}) {
            const PAGE_TITLES = {
                "/": "Rassegne stampa",
                "/social": "Social media",
                "/admin": "Amministrazione"
            };
            const title = PAGE_TITLES[useLocation().pathname];
            document.title = title;

            return (
                <Link
                    className={"width-fit flex-center transition rounded pointer gap-1 padding-05-1 " + ((title === PAGE_TITLES[url]) ? "selected" : "unselected")}
                    to={url}>
                    {icon}
                    <h2>{name}</h2>
                </Link>
            );
        }

        return (
            <nav className="navbar flex shadow width-100">
                <img src="static/images/logo.png" alt="UNIMORE"/>

                <div className="flex-center gap-2">
                    <NavItem name={<>Social <span>media</span></>} icon={<i className="fa-solid fa-chart-column"></i>}
                             url="/social"/>
                    <NavItem name={<>Rassegna <span>stampa</span></>}
                             icon={<i className="fa-regular fa-file-lines"></i>} url="/"/>
                    <NavItem name="Amministrazione" icon={<i className="fa-solid fa-plus"></i>} url="/admin"/>
                </div>
            </nav>
        )
    }

    function Title({title, subtitle}) {
        return (
            <div>
                <h1>{title}</h1>
                <h4>{subtitle}</h4>
            </div>
        )
    }

    function SocialTitle({social}) {
        return (
            <div className={"width-fit flex-center rounded gap-1 padding-05-1 " + (social)}>
                <i className={"fa-brands fa-" + (social.toLowerCase())}></i>
                <h3>{social}</h3>
            </div>
        )
    }

    function SectionTitle({title, i}) {
        return (
            <div className="width-fit flex-center rounded gap-1 padding-05-1">
                <i className={"color-primary " + i}></i>
                <h3>{title}</h3>
            </div>
        )
    }

    function Filter({label, visible, onToggle}) {
        return (
            <div
                className={"width-fit flex-center bg-main pointer rounded gap-1 padding-05-1 " + (visible ? '' : 'disabled-filter')}
                onClick={onToggle}>
                <i className={"fa-solid " + (visible ? 'fa-minus' : 'fa-plus')}></i>
                <p>{label}</p>
            </div>
        )
    }

    function Social() {
        function SocialChart({social}) {
            const [data, setData] = React.useState([]);
            const [visibles, setVisibles] = React.useState({
                Follower: true,
                Interazioni: true,
                Visualizzazioni: true
            });

            React.useEffect(() => {
                fetch(`/social/${social}`)
                    .then(res => res.json())
                    .then(rawData => {
                        setData(cleanData(rawData));
                    })
                    .catch(err => console.error('Errore nel caricamento dei dati di ' + social + ': ' + err))
            }, [social]);

            const startIndex = getStartingIndex(data);

            const toggleLine = (line) => toggleVisibility(setVisibles, line);

            const isMobile = useIsMobile();

            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <div className="flex-column gap-05">
                        <SocialTitle social={social}/>
                        <h4>Scorri la barra sotto al grafico per regolare lo zoom</h4>
                    </div>

                    <div className={`flex-column gap-1 ${isMobile ? "no-brush-labels" : ""}`}>
                        <div className="flex gap-1 filter">
                            <Filter label="Follower" onToggle={() => toggleLine('Follower')}
                                    visible={visibles["Follower"]}/>
                            <Filter label="Visualizzazioni" onToggle={() => toggleLine('Visualizzazioni')}
                                    visible={visibles["Visualizzazioni"]}/>
                            <Filter label="Interazioni" onToggle={() => toggleLine('Interazioni')}
                                    visible={visibles["Interazioni"]}/>
                        </div>

                        <ResponsiveContainer width="100%" height={500} className="recharts-wrapper">
                            <LineChart data={data} responsive>
                                <CartesianGrid/>
                                <Line hide={!visibles.Follower} dataKey="follower" stroke="red" name="follower"
                                      strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibles.Interazioni} dataKey="interazioni" stroke="green" name="interazioni"
                                      strokeWidth={2} isAnimationActive={false}/>
                                <Line hide={!visibles.Visualizzazioni} dataKey="visualizzazioni" stroke="blue"
                                      name="visualizzazioni" strokeWidth={2} isAnimationActive={false}/>
                                <XAxis
                                    dataKey="timestamp"
                                    scale="time"
                                    type="number"
                                    domain={['dataMin', 'dataMax']}
                                    tickFormatter={formatToUI}
                                    minTickGap={30}
                                    angle={-45}
                                    textAnchor="end"
                                    height={80}
                                />
                                <Brush
                                    key={startIndex}
                                    dataKey="timestamp"
                                    height={20}
                                    stroke="var(--color-text-muted)"
                                    travellerWidth={10}
                                    startIndex={startIndex}
                                    tickFormatter={formatToUI}
                                />
                                <YAxis mirror={isMobile}/>
                                <Tooltip labelFormatter={formatToUI}/>
                                <Legend align="right"/>
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            )
        }

        return (
            <div className="content flex-column gap-2 width-100">
                <Title title="Social Media" subtitle="Panoramica delle performance sui social media"/>
                <SocialChart social="Instagram"/>
                <SocialChart social="Facebook"/>
                <SocialChart social="Linkedin"/>
            </div>
        )
    }

    function Admin() {
        const timeout = 15000;
        const today = new Date().toISOString().split('T')[0];
        const setFooter = React.useContext(FooterContext);

        function useStatus() {
            const [status, setStatus] = React.useState({
                message: "",
                error: "",
            });

            const timeoutRef = React.useRef(null);

            const showStatus = (newStatus) => {
                clearTimeout(timeoutRef.current);

                setStatus(newStatus);

                if (newStatus.message || newStatus.error) {
                    timeoutRef.current = setTimeout(() => {
                        setStatus({
                            message: "",
                            error: ""
                        });
                    }, timeout);
                }
            };

            React.useEffect(() => {
                return () => clearTimeout(timeoutRef.current);
            }, []);

            return {
                status,
                setStatus: showStatus
            };
        }

        function SocialForm({ social }) {
            const [formData, setFormData] = React.useState({
                giorno: today,
                visualizzazioni: 0,
                interazioni: 0,
                follower: 0
            });

            const {
                status,
                setStatus
            } = useStatus();

            const handleChange = (e) => {
                const { name, value } = e.target;

                setFormData(prev => ({
                    ...prev,
                    [name]: name === "giorno" ? value : Number(value)
                }));
            };

            const sendForm = (e) => {
                e.preventDefault();

                setStatus({
                    message: "",
                    error: "",
                });

                fetch("/admin/add-dati-social", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ...formData,
                        social
                    })
                })
                .then((res) => {
                    if (!res.ok) {
                        return res.text().then(text => {
                            throw new Error(text);
                        });
                    }
                    return res;
                })
                .then(() => {
                    setStatus({
                        message: "Dati inseriti correttamente",
                        error: "",
                    });
                    refreshManager.set();
                })
                .catch((err) => {
                    if (err.message === "Duplicato") err.message = "Questi dati sono già stati inseriti"
                    setStatus({
                        message: "",
                        error: err.message || "Errore di connessione al server",
                    });
                })
            };

            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <div className="flex-column gap-05">
                        <SocialTitle social={social} />
                        <h4>Inserisci i dati giornalieri per {social}</h4>
                    </div>

                    <form autoComplete="off" onSubmit={sendForm} className="flex-column gap-1">
                        <label>
                            DATA
                            <input type="date" name="giorno" value={formData.giorno} max={today} onChange={handleChange} className="input width-100 rounded" required/>
                        </label>

                        <label>
                            VISUALIZZAZIONI
                            <input type="number" name="visualizzazioni" value={formData.visualizzazioni} min="0" onChange={handleChange} className="input width-100 rounded" required/>
                        </label>

                        <label>
                            INTERAZIONI
                            <input type="number" name="interazioni" value={formData.interazioni} min="0" onChange={handleChange} className="input width-100 rounded" required/>
                        </label>

                        <label>
                            NUOVI FOLLOWERS
                            <input type="number" name="follower" value={formData.follower} min="0" onChange={handleChange} className="input width-100 rounded" required/>
                        </label>

                        <div className="width-fit flex-center gap-1">
                            <input type="submit" value={status.loading ? "Salvataggio..." : "Salva Dati"} disabled={status.loading} className="submit pointer rounded padding-05-1" data-platform={social}/>

                            {status.message && (<p className="message">{status.message}</p>)}
                            {status.error && (<p className="error">{status.error}</p>)}
                        </div>
                    </form>
                </div>
            );
        }

        function RassegnaForm() {
            const [file, setFile] = React.useState(null);
            const [giorno, setGiorno] = React.useState(today);

            const {
                status,
                setStatus
            } = useStatus();

            const fileInputRef = React.useRef(null);

            const handleFiles = (files) => {
                if (!files || files.length === 0) {
                    return;
                }
                setStatus(prev => ({
                    message: "",
                    error: ""
                }));
                setFile(files[0]);
            };

            const resetFile = () => {
                setFile(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = "";
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleFiles(e.dataTransfer.files);
            };

            const handleChange = (e) => {
                handleFiles(e.target.files);
            };

            const sendForm = (e) => {
                e.preventDefault();
                setStatus({ message: "", error: "" });

                // 1. Attiviamo il footer immediatamente
                setFooter({ visible: true, error: false });

                const formData = new FormData(e.target);

                fetch("/admin/add-rassegna", {
                    method: "POST",
                    body: formData
                })
                .then(res => {
                    if (!res.ok) return res.text().then(text => { throw new Error(text) });
                    return res;
                })
                .then(() => {
                    // 2. Reset del form locale
                    resetFile();
                    setGiorno(today);
                    // Il polling inizierà automaticamente nel FooterManager
                    // perché ha visto che 'visible' è diventato true
                })
                .catch(err => {
                    setStatus({ message: "", error: err.message || "Errore" });
                    // 3. In caso di errore immediato (es. rete), spegniamo il footer
                    setFooter({ visible: false, error: false });
                });
            };

            return (
                <div className="section transition rounded shadow flex-column gap-1">
                    <div>
                        <SectionTitle title="Carica rassegna stampa" i="fa-regular fa-file-lines"/>
                        <h4>Carica una rassegna stampa per estrarre automaticamente il numero di articoli</h4>
                    </div>

                    <form encType="multipart/form-data" className="flex-column gap-1" onSubmit={sendForm} autoComplete="off">
                        <label className="dropzone transition rounded flex-center width-100 pointer" onDrop={handleDrop} onDragOver={(e) => e.preventDefault()}>
                            <input type="file" accept=".pdf" name="file" hidden onChange={handleChange} ref={fileInputRef}/>

                            <div className="dropzone-content flex-center flex-column gap-05">
                                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>

                                <p className="dropzone-title">{file ? `✅ ${file.name}` : "Trascina un file PDF qui"}</p>
                                <p className="dropzone-sub">oppure clicca per selezionare</p>
                            </div>
                        </label>

                        <label>
                            DATA
                            <input type="date" name="giorno" value={giorno} onChange={(e) => setGiorno(e.target.value)} className="input width-100 rounded" max={today} required/>
                        </label>

                        <div className="width-fit flex-center gap-1">
                            <input type="submit" value={status.loading ? "Caricamento..." : "Salva rassegna"} className={`submit rounded padding-05-1 ${(file && !status.loading) ? "pointer" : "disabled"}`} disabled={!file || status.loading}/>
                            {status.message && (<p className="message">{status.message}</p>)}
                            {status.error && (<p className="error">{status.error}</p>)}
                        </div>
                    </form>
                </div>
            );
        }

        function EliminaDati() {
            const [data, setData] = React.useState([]);
            const {
                status,
                setStatus,
            } = useStatus();

            React.useEffect(() => {
                return refreshManager.subscribe(() => {
                    loadData();
                });
            }, []);

            const loadData = () => {
                fetch("/admin/latest")
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => {
                            throw new Error(text);
                        });
                    }
                    return res;
                })
                .then(res => res.json())
                .then(rawData => {
                    setData(cleanData(rawData));
                })
                .catch(err => {
                    console.error(
                        "Errore nel caricamento dei dati:",
                        err
                    );
                });
            };

            React.useEffect(() => {
                loadData();
            }, []);

            const del = (nome, giorno, tipo) => {
                setStatus({
                    message: "",
                    error: "",
                });

                fetch("/admin/delete", {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        'giorno': giorno,
                        'nome': nome,
                        'tipo': tipo
                    })
                })
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => {
                            throw new Error(text);
                        });
                    }
                    return res;
                })
                .then(() => {
                    setStatus({
                        message: "Dati eliminati correttamente",
                        error: "",
                    });
                    loadData();
                })
                .catch(err => {
                    setStatus({
                        message: "",
                        error: err.message || "Errore di connessione al server",
                    });
                });
            };

            function Item({nome, giorno, tipo, visible}) {
                return (
                    <div className="flex-center flex-between transition rounded width-100 bg-main padding-05-1">
                        <div className="width-66 flex">
                            <div className="width-50">
                                {(tipo === 'social') ? <SocialTitle social={nome}/> : <p>{nome}</p>}
                            </div>
                            <p className="width-50 flex-center">{visible}</p>
                        </div>

                        <a onClick={() => { del(nome, giorno, tipo) }} title="Elimina">
                            <div className="flex-center padding-1 pointer unselected rounded transition width-fit">
                                <i className="fa-solid fa-trash"></i>
                            </div>
                        </a>
                    </div>
                )
            }

            return (
                <div className="section flex-column gap-1 rounded transition shadow">
                    <div className="flex">
                        <div className="flex flex-center filter">
                            <SectionTitle title="Elimina gli ultimi dati caricati" i="fa-regular fa-pen-to-square"/>
                            {status.message && <p className="message">{status.message}</p>}
                            {status.error && <p className="error">{status.error}</p>}
                        </div>
                    </div>
                    {data.map(element => (
                        <Item key={element.nome + element.giorno} {...element}/>
                    ))}
                </div>
            )
        }

        function ControlloTestate() {
            const [data, setData] = React.useState([]);
            const {
                status,
                setStatus
            } = useStatus();

            const loadTestate = () => {
                fetch("/admin/testate")
                    .then(res => {
                        if (!res.ok) {
                            return res.text().then(text => {
                                throw new Error(text);
                            });
                        }
                        return res.json();
                    })
                    .then(data => setData(data))
                    .catch(err => {
                        console.error(
                            "Errore nel caricamento delle testate:",
                            err
                        );
                    });
            };

            React.useEffect(() => {
                loadTestate();
            }, []);

            const confermaTestata = (nome, scala, importanza) => {
                if (importanza < 0 || importanza > 10) {
                    setStatus({
                        message: "",
                        error: "Valore di importanza non valido",
                    });
                    return;
                }

                fetch("/admin/conferma", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nome,
                        scala,
                        importanza
                    })
                })
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => {
                            throw new Error(text);
                        });
                    }
                })
                .then(() => {
                    setData(prev =>
                        prev.map(t =>
                            t.nome === nome
                                ? {
                                    ...t,
                                    scala,
                                    importanza
                                }
                                : t
                        )
                    );

                    setStatus({
                        message: "Testata aggiornata correttamente",
                        error: "",
                    });
                })
                .catch(err => {
                    setStatus({
                        message: "",
                        error: err.message || "Errore di connessione al server",
                    });
                });
            };

            function Item({nome, oldScala, oldImportanza}) {
                const [editing, setEditing] = React.useState(false);
                const [scala, setScala] = React.useState(oldScala);
                const [importanza, setImportanza] = React.useState(oldImportanza);

                const toggleEditing = () => {
                    if (editing) {  // Annulla — ripristina i valori originali
                        setScala(oldScala);
                        setImportanza(oldImportanza);
                    }
                    setEditing(prev => !prev);
                };

                return (
                    <div className="flex-center flex-between transition rounded width-100 bg-main padding-05-1">
                        <div className="flex-center flex-between width-80 filter">
                            <div className="width-30">
                                <p>{nome}</p>
                            </div>

                            <div className="width-30">
                                {editing
                                    ? <select value={scala} onChange={e => setScala(e.target.value)}
                                              className="input rounded padding-05-1 bg-white">
                                        <option value="Locale">Locale</option>
                                        <option value="Nazionale">Nazionale</option>
                                        <option value="Internazionale">Internazionale</option>
                                    </select>
                                    : <p>{scala}</p>
                                }
                            </div>

                            <div className="width-10">
                                {editing
                                    ? <input
                                        type="number"
                                        min="0"
                                        max="10"
                                        step="1"
                                        value={importanza}
                                        onChange={e => setImportanza(e.target.value)}
                                        className="input rounded bg-white"
                                    />
                                    : <p>{importanza}</p>
                                }
                            </div>
                        </div>

                        <div className="flex gap-05">
                            {editing &&
                                <button type="button" className="padding-1 transition flex-center pointer rounded unselected" title="Salva"
                                   onClick={() => { confermaTestata(nome, scala, Number(importanza)) ; setEditing(false)}}>
                                    <i className="fa-solid fa-check"></i>
                                </button>
                            }

                            <button type="button" className="padding-1 transition flex-center pointer rounded unselected" title="Modifica"
                               onClick={toggleEditing}>
                                <i className="fa-solid fa-pen"></i>
                            </button>
                        </div>
                    </div>
                )
            }

            return (
                <div className="section rounded shadow flex-column gap-1">
                    <div>
                        <div className="flex gap-1">
                            <SectionTitle title="Verifica testate" i="fa-solid fa-file-pen"/>
                            {status.error && (<p className="error">{status.error}</p>)}
                        </div>
                        <h4>Le testate sono valutate in automatico tramite un'intelligenza artificiale, è necessario verificare che i dati siano corretti.</h4>
                    </div>

                    <div>
                        <p className="secondary">Di seguito sono riportate per ogni testata la scala e il grado di importanza (calcolato da 0 a 10), esempi di valutazione: </p>
                        <ul className="padding-05-1 secondary flex-column gap-05">
                            <li>ANSA: 10</li>
                            <li>Il Messaggero: 8</li>
                            <li>Gazzetta di Modena: 6</li>
                            <li>24Emilia: 4</li>
                        </ul>
                    </div>

                    <div className="flex-column gap-05">
                        {data.map((testata) =>
                            <Item key={testata.nome} nome={testata.nome} oldScala={testata.scala} oldImportanza={testata.importanza}/>
                        )}
                    </div>
                </div>
            )
        }

        return (
            <div className="content flex-column gap-2 width-100">
                <Title title="Amministrazione" subtitle="Aggiungi dati social e carica rassegne stampa"/>

                <SocialForm social="Instagram"/>
                <SocialForm social="Facebook"/>
                <SocialForm social="Linkedin"/>
                <RassegnaForm/>
                <EliminaDati/>
                <ControlloTestate/>
            </div>
        )
    }

    function Index() {
        const TOTAL = "Totale";
        const [data, setData] = React.useState([]);
        const [topics, setTopics] = React.useState([]);

        const loadReports = () => {
            fetch("/index/all-rassegne")
                .then(res => res.json())
                .then(rawData => setData(cleanData(rawData)))
                .catch(err => {console.error("Error loading reports:", err)});
        };

        const loadTopics = () => {
            fetch("/index/all-temi")
                .then(res => res.json())
                .then(data => setTopics([...data, TOTAL]))
                .catch(err => console.error("Error loading topics:", err));
        };

        React.useEffect(() => {
            loadReports();
            loadTopics();

            return refreshManager.subscribe(() => {
                loadReports();
                loadTopics();
            });
        }, []);

        const createInitialVisibleTopics = (topics) => {
            const visibleTopics = {};

            topics.forEach(topic => {
                visibleTopics[topic] = false;
            });

            visibleTopics[TOTAL] = true;

            return visibleTopics;
        };

        function SharedChart({data, lines, visibleTopics, toggleTopicLine, getLineProps = () => ({})}) {
            const COLORS = ["blue", "green", "red", "orange", "purple", "pink", "yellow", "black"];
            const startIndex = getStartingIndex(data);

            const openReport = (chartData) => {
                if (!chartData || !chartData.activePayload || chartData.activePayload.length === 0) {
                    return;
                }

                const payload = chartData.activePayload[0].payload;

                window.open(`/index/file?data=${payload.giorno}`, "_blank");
            };

            const isMobile = useIsMobile();

            return (
                <div className={`flex-column gap-1 ${isMobile ? "no-brush-labels" : ""}`}>
                    <div className="flex gap-1 filter">
                        {topics
                            .filter(topic => topic !== TOTAL)
                            .map(topic => (
                                <Filter
                                    key={topic}
                                    label={topic}
                                    onToggle={() => toggleTopicLine(topic)}
                                    visible={visibleTopics[topic]}
                                />
                            ))}
                    </div>

                    <ResponsiveContainer width="100%" height={500} className="recharts-wrapper">
                        <LineChart data={data} onDoubleClick={openReport}>
                            <CartesianGrid/>

                            {lines.map((line, i) => (
                                <Line
                                    key={line}
                                    dataKey={line}
                                    stroke={COLORS[i]}
                                    name={line}
                                    strokeWidth={2}
                                    isAnimationActive={false}
                                    {...getLineProps(line)}
                                />
                            ))}

                            <XAxis
                                dataKey="timestamp"
                                scale="time"
                                type="number"
                                domain={["dataMin", "dataMax"]}
                                tickFormatter={formatToUI}
                                minTickGap={30}
                                angle={-45}
                                textAnchor="end"
                                height={80}
                            />

                            <Brush
                                dataKey="timestamp"
                                height={20}
                                stroke="var(--color-text-muted)"
                                travellerWidth={10}
                                startIndex={startIndex}
                                tickFormatter={formatToUI}
                            />

                            <YAxis mirror={isMobile}/>
                            <Tooltip labelFormatter={formatToUI}/>
                            <Legend align="right"/>
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            );
        }

        function Chart1() {
            const [visibleTopics, setVisibleTopics] = React.useState(() => createInitialVisibleTopics(topics));

            const toggleLine = (line) => {
                setVisibleTopics(prev => {
                    const updated = {
                        ...prev,
                        [line]: !prev[line]
                    };

                    const hasActiveTopic = topics.some(
                        topic => topic !== TOTAL && updated[topic]
                    );

                    updated[TOTAL] = !hasActiveTopic;

                    return updated;
                });
            };

            return (
                <SharedChart
                    data={data}
                    lines={topics}
                    visibleTopics={visibleTopics}
                    toggleTopicLine={toggleLine}
                    getLineProps={(topic) => ({
                        hide: !visibleTopics[topic]
                    })}
                />
            );
        }

        function filterChartData({data, lines, visibleTopics}) {
            const activeTopics = Object.keys(visibleTopics).filter(
                topic => topic !== TOTAL && visibleTopics[topic]
            );

            return data.map(row => {
                const newRow = {
                    giorno: row.giorno,
                    timestamp: row.timestamp
                };

                lines.forEach(line => {
                    const lineData = row[line];

                    if (!lineData) {
                        newRow[line] = 0;
                        return;
                    }

                    if (activeTopics.length === 0) {
                        newRow[line] = lineData.totale || 0;
                        return;
                    }

                    let total = 0;

                    activeTopics.forEach(topic => {
                        total += lineData[topic] || 0;
                    });

                    newRow[line] = total;
                });

                return newRow;
            });
        }

        function Chart2() {
            const [scales, setScales] = React.useState([]);
            const [data, setData] = React.useState([]);
            const [visibleTopics, setVisibleTopics] = React.useState(() => createInitialVisibleTopics(topics));

            const loadScales = () => {
                fetch("/index/all-scale")
                    .then(res => res.json())
                    .then(data => setScales(data))
                    .catch(err => console.error("Error loading scales:", err));
            };

            const loadChartData = () => {
                fetch("/index/all-rassegne-per-scala")
                    .then(res => res.json())
                    .then(rawData => setData(cleanData(rawData)))
                    .catch(err => console.error("Error loading chart data:", err));
            };

            React.useEffect(() => {
                loadScales();
                loadChartData();
            }, []);

            const filteredData = React.useMemo(() => {
                return filterChartData({
                    data,
                    lines: scales,
                    visibleTopics
                });
            }, [data, scales, visibleTopics]);

            return (
                <SharedChart
                    data={filteredData}
                    lines={scales}
                    visibleTopics={visibleTopics}
                    toggleTopicLine={(line) => toggleVisibility(setVisibleTopics, line)}
                />
            );
        }

        function Chart3({ openReport }) {
            const [publishers, setPublishers] = React.useState([]);
            const [data, setData] = React.useState([]);
            const [visibleTopics, setVisibleTopics] = React.useState(() => createInitialVisibleTopics(topics));

            const loadPublishers = () => {
                fetch("/index/all-testate-importanti")
                    .then(res => res.json())
                    .then(data => setPublishers(data))
                    .catch(err => console.error("Error loading publishers:", err));
            };

            const loadChartData = () => {
                fetch("/index/all-rassegne-per-testata")
                    .then(res => res.json())
                    .then(rawData => setData(cleanData(rawData)))
                    .catch(err => console.error("Error loading chart data:", err));
            };

            React.useEffect(() => {
                loadPublishers();
                loadChartData();
            }, []);

            const filteredData = React.useMemo(() => {
                return filterChartData({
                    data,
                    lines: publishers,
                    visibleTopics
                });
            }, [data, publishers, visibleTopics]);

            return (
                <SharedChart
                    data={filteredData}
                    lines={publishers}
                    visibleTopics={visibleTopics}
                    toggleTopicLine={(line) => toggleVisibility(setVisibleTopics, line)}
                />
            );
        }

        function ReportItem({day, name, displayDate, snippet}) {
            const URL = `/index/file?data=${day}`;

            return (
                <div className="flex-column transition rounded width-100 bg-main padding-05-1">
                    <div className="flex-between flex-center">
                        <div className="width-66 flex">
                            <p className="width-50">{name}</p>
                            <p id="date-list-item" className="width-50 flex-center">{displayDate}</p>
                        </div>

                        <div className="flex">
                            <a className="padding-1 transition flex-center pointer rounded unselected" href={URL} download>
                                <i className="fa-solid fa-download"></i>
                            </a>

                            <a className="padding-1 transition flex-center pointer rounded unselected" href={URL} target="_blank" rel="noreferrer">
                                <i className="fa-solid fa-eye"></i>
                            </a>
                        </div>
                    </div>

                    {snippet && (<p className="secondary width-100" dangerouslySetInnerHTML={ {__html: snippet} }></p>)}
                </div>
            );
        }

        function ReportsSearch() {
            const [value, setValue] = React.useState("");
            const [error, setError] = React.useState(null);
            const [results, setResults] = React.useState([]);

            const abortRef = React.useRef(null);

            function parseDateInput(value) {
                const regex = /^(?:(\d{4})|((0?[1-9]|1[0-2])\/(\d{4}))|((0?[1-9]|[12]\d|3[01])\/(0?[1-9]|1[0-2])\/(\d{4})))$/;

                if (!regex.test(value)) {
                    return {valid: false};
                }

                const parts = value.split("/");

                if (parts.length === 1) {
                    return {
                        valid: true,
                        year: parseInt(parts[0]),
                        month: null,
                        day: null
                    };
                }

                if (parts.length === 2) {
                    return {
                        valid: true,
                        year: parseInt(parts[1]),
                        month: parseInt(parts[0]),
                        day: null
                    };
                }

                if (parts.length === 3) {
                    const day = parseInt(parts[0]);
                    const month = parseInt(parts[1]);
                    const year = parseInt(parts[2]);

                    const date = new Date(year, month - 1, day);

                    const isRealDate =
                        date.getFullYear() === year &&
                        date.getMonth() === month - 1 &&
                        date.getDate() === day;

                    return {
                        valid: isRealDate,
                        year,
                        month,
                        day
                    };
                }

                return {valid: false};
            }

            function filterReportsByDate(reports, parsedDate) {
                return reports.filter(report => {
                    const reportDate = report.displayDate.split("/");

                    if (parsedDate.year && !parsedDate.month && !parsedDate.day) {
                        return parseInt(reportDate[2]) === parsedDate.year;
                    }

                    if (parsedDate.year && parsedDate.month && !parsedDate.day) {
                        return parseInt(reportDate[2]) === parsedDate.year && parseInt(reportDate[1]) === parsedDate.month;
                    }

                    if (parsedDate.year && parsedDate.month && parsedDate.day) {
                        return parseInt(reportDate[2]) === parsedDate.year && parseInt(reportDate[1]) === parsedDate.month && parseInt(reportDate[0]) === parsedDate.day;
                    }
                });
            }

            const handleChange = (e) => {
                const input = (e.target.value).trim();
                setValue(input);

                if (abortRef.current) {
                    abortRef.current.abort();
                }

                if(input == ""){
                    setError(null);
                    setResults([]);
                    return;
                }

                const parsedDate = parseDateInput(input);

                if (parsedDate.valid) {
                    setError(null);
                    setResults(filterReportsByDate(data, parsedDate));
                    return;
                }

                const controller = new AbortController();
                abortRef.current = controller;

                fetch(`/index/search-rassegne?q=${input}`, {
                    signal: controller.signal
                })
                    .then(res => res.json())
                    .then(rawData => {
                        setError(null);
                        setResults(cleanData(rawData));
                    })
                    .catch(err => {
                        if (err.name === "AbortError") return;
                        setError("Errore nella ricerca");
                        console.error(err);
                    });
            };

            return (
                <div className="section transition rounded width-100 shadow flex-column gap-1">
                    <div>
                        <SectionTitle title="Cerca rassegna stampa" i="fa-regular fa-file-lines"/>
                        <h4>Cerca per parola chiave o per data (AAAA o MM/AAAA o GG/MM/AAAA)</h4>
                    </div>

                    <div className="flex-center flex-between width-100 rounded padding-05-1 input">
                        <div className="flex-center width-80">
                            <i className="fa-solid fa-magnifying-glass color-primary"></i>
                            <input type="text" id="search" placeholder="Inserisci la data o la parola chiave..." value={value} onChange={handleChange} className="width-100" autoComplete="off"/>
                        </div>

                        {error && (<p className="error">{error}</p>)}
                    </div>

                    <div className="flex-center flex-column gap-1 width-100">
                        {!error && results.map(report => (
                            <ReportItem
                                key={report.giorno}
                                day={report.giorno}
                                name={report.nome_file}
                                displayDate={report.displayDate}
                                snippet={report.snippet}
                            />
                        ))}
                    </div>
                </div>
            );
        }

        return (
            <div className="content flex-column gap-2">
                <Title title="Rassegna stampa" subtitle="Gestione e analisi delle rassegne stampa"/>

                <div className="section transition rounded shadow flex-column gap-1">
                    <div>
                        <SectionTitle title="Numero articoli per tema" i="fa-solid fa-arrow-up-1-9"/>
                        <h4>Scorri la barra sotto al grafico per regolare lo zoom, clicca due volte su un punto per aprire la rassegna stampa</h4>
                    </div>
                    <Chart1/>
                </div>

                <div className="section transition rounded shadow flex-column gap-1">
                    <div>
                        <SectionTitle title="Numero articoli per scala" i="fa-solid fa-arrow-up-1-9"/>
                        <h4>Scorri la barra sotto al grafico per regolare lo zoom, clicca due volte su un punto per aprire la rassegna stampa</h4>
                    </div>
                    <Chart2/>
                </div>

                <div className="section transition rounded shadow flex-column gap-1">
                    <div>
                        <SectionTitle title="Numero articoli per testata più importante" i="fa-solid fa-arrow-up-1-9"/>
                        <h4>Scorri la barra sotto al grafico per regolare lo zoom, clicca due volte su un punto per aprire la rassegna stampa</h4>
                    </div>
                    <Chart3/>
                </div>
                <ReportsSearch/>
            </div>
        )
    }

    function Footer({ error }) {
        return (
            <div className={`footer width-100 ${error ? "footer-error" : ""}`}>
                <div className="width-fit flex-center color-white gap-1">
                    <i className={ error ? "fa-solid fa-triangle-exclamation" : "fa-solid fa-circle-notch icona-spin"}></i>
                    <h3>{error ? "Non è stato possibile processare la rassegna stampa, riprovare . . ." : "La rassegna stampa inserita è in fase di elaborazione . . ."}</h3>
                </div>
            </div>
        );
    }

    const FooterContext = React.createContext(null);

    function FooterManager({ children }) {
        const [footer, setFooter] = React.useState({ visible: false, error: false });
        const location = useLocation();
        const intervalRef = React.useRef(null);

        // Funzione per fermare il polling
        const stopPolling = () => {
            if (intervalRef.current) {
                clearInterval(intervalRef.current);
                intervalRef.current = null;
            }
        };

        // Effetto per gestire il polling globale
        React.useEffect(() => {
            // Se il footer è visibile e NON è in errore, iniziamo a controllare lo stato
            if (footer.visible && !footer.error) {
                stopPolling(); // Pulizia preventiva

                intervalRef.current = setInterval(() => {
                    fetch("/status")
                        .then(res => res.json())
                        .then(data => {
                            if (data.done) {
                                stopPolling();
                                if (data.error) {
                                    setFooter({ visible: true, error: true });
                                    // Nascondi l'errore automaticamente dopo 15 secondi
                                    setTimeout(() => setFooter({ visible: false, error: false }), 15000);
                                } else {
                                    // Successo: nascondi il footer e rinfresca i dati globali
                                    setFooter({ visible: false, error: false });
                                    refreshManager.set();
                                }
                            }
                        })
                        .catch(() => {
                            stopPolling();
                            setFooter({ visible: true, error: true });
                        });
                }, 800);
            }

            return () => stopPolling();
        }, [footer.visible, footer.error]); // Si attiva quando Admin cambia lo stato del footer

        // Opzionale: reset del footer al cambio pagina se NON sta caricando
        // Se vuoi che il caricamento continui tra le pagine, NON resettare se visible è true
        React.useEffect(() => {
            if (footer.error) {
                setFooter({ visible: false, error: false });
            }
        }, [location.pathname]);

        return (
            <FooterContext value={setFooter}>
                {children}
                {footer.visible && <Footer error={footer.error} />}
            </FooterContext>
        );
    }

    function App() {
        return (
            <BrowserRouter>
                <FooterManager>
                    <NavBar/>
                    <Routes>
                        <Route path="/admin" element={<Admin/>}/>
                        <Route path="/" element={<Index/>}/>
                        <Route path="/social" element={<Social/>}/>
                    </Routes>
                </FooterManager>
            </BrowserRouter>
        );
    }

    createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
